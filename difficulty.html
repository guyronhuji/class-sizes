    <script type="text/plain" id="dashboard-script">
const { useEffect, useRef, useState, useMemo } = React;

const CMIN = 76;
const CMAX = 98;
const COLORSCALE = [
  [0,    "#d73027"],
  [0.25, "#fc8d59"],
  [0.5,  "#ffffbf"],
  [0.75, "#91cf60"],
  [1,    "#1a9850"],
];

function buildTrace(data) {
  return {
    type: "scatter",
    mode: "markers",
    x: data.map((d) => d.mean),
    y: data.map((d) => d.std),
    marker: {
      size: data.map((d) => Math.sqrt(d.n) * 3.5),
      sizemode: "diameter",
      color: data.map((d) => d.mean),
      colorscale: COLORSCALE,
      cmin: CMIN,
      cmax: CMAX,
      colorbar: {
        title: { text: "Mean Grade", font: { color: "#98a2c3", size: 11 } },
        tickfont: { color: "#98a2c3" },
        thickness: 12,
        len: 0.65,
      },
      line: { width: 0.5, color: "rgba(255,255,255,0.15)" },
      opacity: 0.88,
    },
    text: data.map(
      (d) =>
        `<b>${d.name}</b><br>` +
        `Course: ${d.code}<br>` +
        `Students: ${d.n}<br>` +
        `Mean: ${d.mean.toFixed(1)}<br>` +
        `Median: ${d.median.toFixed(1)}<br>` +
        `Std Dev: ${d.std.toFixed(1)}<br>` +
        `Min / Max: ${d.min} / ${d.max}`
    ),
    hoverinfo: "text",
  };
}

    zerolinecolor: "#282d3e",
    tickfont: { color: "#98a2c3" },
    linecolor: "#282d3e",
  },
  yaxis: {
    title: { text: "Std Dev of Grades  (grade spread)", font: { color: "#98a2c3", size: 12 } },
    range: [-0.5, 18],
    gridcolor: "#282d3e",
    zerolinecolor: "#282d3e",
    tickfont: { color: "#98a2c3" },
    linecolor: "#282d3e",
  },
  margin: { t: 16, r: 80, b: 56, l: 68 },
  font: { family: '"DM Sans", system-ui, sans-serif', color: "#e0e4ef" },
  hoverlabel: {
    bgcolor: "#181b24",
    bordercolor: "#282d3e",
    font: { size: 13, color: "#e0e4ef", family: '"DM Sans", system-ui, sans-serif' },
    align: "right",
  },
  transition: { duration: 280, easing: "cubic-in-out" },
};

const CONFIG = {
  responsive: true,
  displayModeBar: true,
  modeBarButtonsToRemove: ["lasso2d", "select2d"],
  toImageButtonOptions: { filename: "course-difficulty", scale: 2 },
};

function ScatterPlot({ data }) {
  const ref = useRef(null);
  const initialized = useRef(false);

  useEffect(() => {
    if (!ref.current) return;
    const trace = buildTrace(data);
    if (!initialized.current) {
      Plotly.newPlot(ref.current, [trace], LAYOUT, CONFIG);
      initialized.current = true;
    } else {
      Plotly.react(ref.current, [trace], LAYOUT, CONFIG);
    }
  }, [data]);

  useEffect(() => {
    return () => {
      if (ref.current) Plotly.purge(ref.current);
    };
  }, []);

  return <div ref={ref} style={{ width: "100%", height: 520 }} />;
}

function StatCard({ course }) {
  const hardness = ((CMAX - course.mean) / (CMAX - CMIN));
  const hue = hardness < 0.5
    ? `rgb(${Math.round(145 + 110 * hardness * 2)},${Math.round(207 - 116 * hardness * 2)},${Math.round(96 - 50 * hardness * 2)})`
    : `rgb(${Math.round(252 - 92 * (hardness - 0.5) * 2)},${Math.round(141 - 82 * (hardness - 0.5) * 2)},${Math.round(89 - 62 * (hardness - 0.5) * 2)})`;

  return (
    <div
      className="rounded-2xl border p-4 space-y-2"
      style={{ backgroundColor: "#11141c", borderColor: "#282d3e" }}
    >
      <div className="flex items-start justify-between gap-2">
        <span
          className="text-sm font-medium leading-snug"
          style={{ color: "#e0e4ef", direction: "rtl" }}
        >
          {course.name}
        </span>
        <span
          className="shrink-0 rounded-full px-2 py-0.5 text-xs font-medium"
          style={{ backgroundColor: "#181b24", color: "#98a2c3", border: "1px solid #282d3e" }}
        >
          {course.code}
        </span>
      </div>
      <div className="flex items-center gap-3 text-sm" style={{ color: "#98a2c3" }}>
        <span>
          Mean:{" "}
          <span className="font-semibold" style={{ color: hue }}>
            {course.mean.toFixed(1)}
          </span>
        </span>
        <span style={{ color: "#282d3e" }}>·</span>
        <span>
          σ:{" "}
          <span className="font-semibold" style={{ color: "#e0e4ef" }}>
            {course.std.toFixed(1)}
          </span>
        </span>
        <span style={{ color: "#282d3e" }}>·</span>
        <span>n={course.n}</span>
      </div>
    </div>
  );
}

    >
      <div className="mx-auto max-w-7xl space-y-6">

        {/* Header */}
        <header className="space-y-4">
          <div className="flex flex-wrap items-center gap-3">
            <a
              href="./index.html"
              className="inline-flex items-center rounded-full border px-3 py-1 text-xs uppercase tracking-[0.24em]"

            >

          </div>

          <div className="space-y-2">

              style={{ color: "#5b8af5" }}
            >
              Course Analysis
            </div>
            <h1
              className="text-4xl md:text-5xl leading-tight"
              style={{ fontFamily: 'Georgia, "Times New Roman", serif' }}
            >
              Course{" "}
              <span style={{ color: "#f5a85b" }}>Difficulty</span>
            </h1>
            <p className="max-w-2xl text-base leading-7" style={{ color: "#b5bdd4" }}>
              Mean grade vs. grade spread for Physics courses. Bubble size reflects number of students.
              Red = harder (lower mean), green = easier (higher mean).
            </p>
          </div>
        </header>

        {/* Filter */}
        <div
          className="rounded-3xl border p-5 flex flex-wrap items-center gap-5"
          style={{ backgroundColor: "#181b24", borderColor: "#282d3e" }}
        >
          <div
            className="text-xs uppercase tracking-[0.24em]"
            style={{ color: "#98a2c3" }}

          <label className="flex items-center gap-3 text-sm" style={{ color: "#b5bdd4" }}>
            Min students
            <input
              type="number"
              value={minN}

              max="300"
              onChange={(e) => handleChange(e.target.value)}
              className="w-16 rounded-xl border bg-transparent px-3 py-1.5 text-center text-sm font-medium outline-none focus:border-blue-500"
              style={{ borderColor: "#282d3e", color: "#e0e4ef", backgroundColor: "#11141c" }}
            />
            <input
              type="range"
              value={minN}
              min="1"
              max="300"
              onChange={(e) => handleChange(e.target.value)}
              className="w-36 accent-blue-400"
            />
          </label>
          <div className="ml-auto text-sm" style={{ color: "#98a2c3" }}>
            <span className="font-semibold" style={{ color: "#e0e4ef" }}>{filtered.length}</span>{" "}
            courses shown
          </div>
        </div>

        {/* Scatter plot */}
        <div
          className="rounded-3xl border overflow-hidden"
          style={{ backgroundColor: "#181b24", borderColor: "#282d3e" }}
        >
          <div className="px-6 pt-5 pb-2 space-y-1">
            <div className="text-xs uppercase tracking-[0.24em]" style={{ color: "#98a2c3" }}>
              Scatter Plot
            </div>
            <h2

              Difficulty vs grade variance
            </h2>
          </div>

        </div>

        {/* Course table sorted hardest first */}
        <div
          className="rounded-3xl border p-5"
          style={{ backgroundColor: "#181b24", borderColor: "#282d3e" }}
        >
          <div className="mb-5 space-y-2">
            <div className="text-xs uppercase tracking-[0.24em]" style={{ color: "#98a2c3" }}>
              Ranked hardest → easiest
            </div>

              className="text-2xl md:text-3xl"
              style={{ fontFamily: 'Georgia, "Times New Roman", serif' }}

              Course rankings

          </div>
          <div className="grid gap-3 sm:grid-cols-2 xl:grid-cols-3">

}
